name: publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: setup jdk
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'microsoft'

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: build
        run: ./gradlew build

      - name: fetch tags
        run: git fetch --tags --force

      - name: extract changelog from tag
        id: changelog
        run: |
          TAG_MESSAGE=$(git for-each-ref --format='%(contents)' "refs/tags/${GITHUB_REF_NAME}")
          echo "message<<EOF" >> "$GITHUB_OUTPUT"
          echo "$TAG_MESSAGE" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: set modrinth project environment
        run: |
          curl -s -X PATCH https://api.modrinth.com/v2/project/tab-ping \
            -H "Authorization: $MODRINTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"server_side":"unsupported","client_side":"required"}'
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}

      - name: publish to modrinth
        run: ./gradlew modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CHANGELOG: ${{ steps.changelog.outputs.message }}

      - name: create github release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.message }}
          files: |
            build/libs/pingtabmod-*.jar
            !build/libs/*-sources.jar
